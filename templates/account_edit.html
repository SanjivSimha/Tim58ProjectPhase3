{% extends "base.html" %}

{% block title %}Edit Account - NimbusPay{% endblock %}

{% block content %}
<h2>Edit Account</h2>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" name="company_name" class="form-control" value="{{ customer.company_name }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" name="address" class="form-control" value="{{ customer.address }}" required>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">City</label>
            <input type="text" name="city" class="form-control" value="{{ customer.city }}" required>
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label">State</label>
            <input type="text" name="state" class="form-control" value="{{ customer.state }}" required>
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label">ZIP</label>
            <input type="text" name="zip" class="form-control" value="{{ customer.zip }}" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label">Billing Email</label>
        <input type="email" name="billing_email" class="form-control" value="{{ customer.billing_email }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="tel" name="phone" class="form-control" value="{{ customer.phone }}" required>
    </div>
    <!-- No indication of what happens when you save -->
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('account') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
