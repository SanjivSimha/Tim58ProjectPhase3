<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NimbusPay{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; }
        .nav-pills .nav-link { color: #333; }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
    </style>
</head>
<body>
    {% if user %}
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">NimbusPay</a>
            <span class="navbar-text me-3">{{ user.name }}</span>
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-3">
                <!-- Intentionally flat, confusing navigation -->
                <nav class="nav flex-column nav-pills">
                    <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">Dashboard</a>
                    <a class="nav-link {% if request.endpoint == 'account' %}active{% endif %}" href="{{ url_for('account') }}">Account</a>
                    <a class="nav-link {% if request.endpoint == 'account_edit' %}active{% endif %}" href="{{ url_for('account_edit') }}">Edit Account</a>
                    <a class="nav-link {% if request.endpoint == 'team' %}active{% endif %}" href="{{ url_for('team') }}">Team</a>
                    <a class="nav-link {% if request.endpoint == 'subscription' %}active{% endif %}" href="{{ url_for('subscription') }}">Subscription</a>
                    <a class="nav-link {% if request.endpoint == 'billing' %}active{% endif %}" href="{{ url_for('billing') }}">Billing</a>
                    <a class="nav-link {% if request.endpoint == 'payment' %}active{% endif %}" href="{{ url_for('payment') }}">Payment Method</a>
                </nav>
                <!-- No support/help link anywhere -->
            </div>
            <div class="col-md-9">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    {% else %}
    <div class="container">
        {% block public_content %}{% endblock %}
    </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
